<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Racha · Grupos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
  // O app de grupos foi unificado dentro do Racha (aba "Grupos"). Redireciona.
  var g = (location.hash.match(/join\/([^/]+)/) || [])[1];
  location.replace("../" + (g ? "#join/" + g : "#grupos"));
</script>
</head>
<body>
<p>Os Grupos agora ficam dentro do Racha. <a href="../#grupos">Abrir o Racha →</a></p>
</body>
</html>
